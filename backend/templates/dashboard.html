{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<h2 class="mb-4">Dashboard</h2>

<div class="row">

<div class="col-md-3">
<div class="card shadow">
<div class="card-body text-center">
<h5>Total Assets</h5>
<h2>{{ total_assets }}</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body text-center">
<h5>Available</h5>
<h2>{{ available }}</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body text-center">
<h5>Allocated</h5>
<h2>{{ allocated }}</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body text-center">
<h5>Maintenance</h5>
<h2>{{ maintenance }}</h2>
</div>
</div>
</div>

</div>

{% endblock %}
