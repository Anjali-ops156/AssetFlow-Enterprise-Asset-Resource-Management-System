<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AssetFlow ERP{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f6fa;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            background: #0d6efd;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            color: white;
            display: block;
            text-decoration: none;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, .2);
        }

        .content {
            margin-left: 270px;
            padding: 30px;
        }
    </style>

</head>

<body>

    <div class="sidebar">

        <h3>AssetFlow ERP</h3>

        <hr>

        <a href="/">Dashboard</a>
        <a href="/assets/">Assets</a>
        <a href="/organization/employees/">Employees</a>
        <a href="/bookings/">Bookings</a>
        <a href="/maintenance/">Maintenance</a>
        <a href="/notifications/">Notifications</a>
        <a href="/admin/">Admin</a>

    </div>

    <div class="content">

        {% block content %}

        {% endblock %}

    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
